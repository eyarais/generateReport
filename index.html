            display: none;

            height: 100%;

            margin-top: 5%;
            width: 80%;

            /* Large size */
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(255, 255, 255, 0.5);

        // Function to extract unique 'juz' values and populate the select dropdown with the first Surah of each Juz
        function populateJuzDropdown() {
            // const juzSelect = document.getElementById("juz-select");

            // Populate the dropdown with unique juz values and the name of the first Surah in each Juz
            uniqueJuz.forEach(juz => {
                const firstSurah = surahs.find(surah => surah.juz === juz); // Find the first Surah for the Juz
                const option = document.createElement("option");
                option.value = `${juz}: حزب ${firstSurah.name}`;
                option.textContent = `${juz}: حزب ${firstSurah.name}`;
                // juzSelect.appendChild(option);
            });
        }

            const hifzSection = document.getElementById('hifz-section');
            const cumulativeSection = document.getElementById('cumulative-section');

            // Function to toggle visibility of sections
            function toggleSections() {
                hifzSection.style.display = hifzCheckbox.checked ? 'block' : 'none';
                cumulativeSection.style.display = cumulativeCheckbox.checked ? 'block' : 'none';

            const errorsSurahLabel = document.getElementById('errors-surah-label');
            const frequencySurahLabel = document.getElementById('frequency-surah-label');

            // Function to toggle the visibility of the "اسم السورة" fields
            function toggleSurahFields() {
                // Show or hide "اسم السورة" for errors
                if (parseInt(errorsInput.value) > 0) {
                    errorsSurahLabel.style.display = 'block';
                } else {
                    errorsSurahLabel.style.display = 'none';
                }

                // Show or hide "اسم السورة" for frequencies
                if (parseInt(frequencyInput.value) > 0) {
                    frequencySurahLabel.style.display = 'block';
                } else {
                    frequencySurahLabel.style.display = 'none';
                }
            }

            // Call toggleSurahFields initially to set the correct visibility on page load

            // Function to handle the increment and decrement buttons
            window.changeValue = function (inputId, type, action) {
                const inputElement = document.getElementById(inputId);
                let currentValue = parseInt(inputElement.value);

                if (action === 'increment') {
                    currentValue++;
                } else if (action === 'decrement' && currentValue > 0) {
                    currentValue--;
                }

                inputElement.value = currentValue;

                // Call the toggle function after updating the value
                toggleSurahFields();
            };
        });

            const selectionSection = document.getElementById("selection-section");

                const firstSurah = surahs.find(surah => surah.juz === juz);

        // Select or Deselect all Surahs in a Juz
        function toggleJuzSelection(i, juz, select) {
            const surasDiv = document.getElementById(`suras-${i}`);
            const checkboxes = surasDiv.querySelectorAll("input[type=checkbox]");

            checkboxes.forEach((checkbox) => {
                checkbox.checked = select;
                toggleSurahDetails(checkbox.value, checkbox.checked); // Call to show/hide Surah details
            });

            // If Juz is deselected, hide all Surah details in that Juz
            if (!select) {
                groupedSurahs[juz].forEach(sura => {
                    toggleSurahDetails(sura, false); // Remove details for each Surah in this Juz
                });
                surasDiv.style.display = "none"; // Hide the dropdown for this Juz
            } else {
                surasDiv.style.display = "block"; // Show the dropdown for this Juz
            }

        async function generateReport() {

            const dayName = new Date().toLocaleDateString('ar-EG', { weekday: 'long' });

            let output = `💌 *التقرير اليومي* 💌\n\n`;
            output += `🌱 *ليوم ${dayName}* 🌱\n`;
            output += `━━━━━━━━━━━━━━━\n\n`;

            /* 🌹 ورد الحفظ */

            if (document.getElementById('include-hifz').checked) {

                output += `🌹 *ورد الحفظ* 🌹\n\n`;

                output += `📖 *الوجه:* ${document.getElementById('hifz-surah').value || "غير محدد"}\n`;

                const hifzDuration = document.getElementById('duration-hifz').value;
                if (hifzDuration && hifzDuration !== "00:00") {
                    output += `⏱ *المدة:* ${hifzDuration}\n`;
                }

                output += `❌ *الأخطاء:* ${document.getElementById('hifz-errors').value || 0}\n`;
                output += `⭕ *الترددات:* ${document.getElementById('hifz-frequency').value || 0}\n`;
                output += `🔂 *عدد التكرار:* *${document.getElementById('hifz-repetition').value || 0}*\n\n`;
                output += `━━━━━━━━━━━━━━━\n\n`;
            }

            /* 🌷 ورد التراكمي */

            if (document.getElementById('include-cumulative').checked) {

                output += `🌷 *ورد التراكمي* 🌷\n\n`;

                output += `📄 *الأوجه:* ${document.getElementById('cumulative-pages').value || ""}\n`;

                const cumDuration = document.getElementById('duration-cumulative').value;
                if (cumDuration && cumDuration !== "00:00") {
                    output += `⏱ *المدة:* ${cumDuration}\n`;
                }

                output += `🔂 *التكرار:* ${document.getElementById('cumulative-repetition').value || 0}\n`;
                output += `❌ *الأخطاء:* ${document.getElementById('cumulative-errors').value || 0}\n`;
                output += `⭕ *الترددات:* ${document.getElementById('cumulative-frequency').value || 0}\n\n`;

                output += `━━━━━━━━━━━━━━━\n\n`;
            }

            /* 📖 التسميع والغيبي */

            const tasmi3 = [];
            const ghaybi = [];

            document.querySelectorAll('#selected-details > div').forEach(div => {

                const surahName = div.querySelector('h4')?.innerText.replace(":", "");
                if (!surahName) return;

                const isGhaybi = div.querySelector('.ghaybi-checkbox')?.checked;

                const errors = div.querySelector('.errors')?.value || 0;
                const freq = div.querySelector('.frequencies')?.value || 0;
                const duration =
                    document.getElementById(`duration-${surahName}`)?.value || "00:00";

                const data = { name: surahName, errors, freq, duration };

                isGhaybi ? ghaybi.push(data) : tasmi3.push(data);
            });

            /* 📖 ورد التسميع */

            if (tasmi3.length > 0) {
                output += `📖 *ورد التسميع* 📖\n\n`;

                tasmi3.forEach(s => {
                    output += `🌸 *${s.name}*\n`;

                    if (s.duration !== "00:00") {
                        output += `⏱ المدة: ${s.duration}\n`;
                    }

                    output += `⭕ الترددات: ${s.freq}\n`;
                    output += `❌ الأخطاء: ${s.errors}\n\n`;
                });

                output += `━━━━━━━━━━━━━━━\n\n`;
            }

            /* 🌙 ورد الغيبي */

            if (ghaybi.length > 0) {
                output += `🌙 *ورد الغيبي* 🌙\n\n`;

                ghaybi.forEach(s => {
                    output += `✨ *${s.name}*\n`;

                    if (s.duration !== "00:00") {
                        output += `⏱ المدة: ${s.duration}\n`;
                    }

                    output += `⭕ الترددات: ${s.freq}\n`;
                    output += `❌ الأخطاء: ${s.errors}\n\n`;
                });

                output += `━━━━━━━━━━━━━━━\n\n`;
            }

            /* 📘 المهام */

            output += `📘 *المهام اليومية*\n\n`;
            output += `🎧 التحضير القبلي: ${getStatus("preparation")}\n`;
            output += `📚 التفسير: ${getStatus("tafseer")}\n`;
            output += `🕌 ورد المحراب: ${getStatus("mihrab")}\n`;
            output += `📑 المتشابهات: ${getStatus("motchebeh")}\n`;
            output += `🌧️ الختمة: ${getStatus("monthly-completion")}\n`;
            output += `💕 الأذكار: ${getStatus("athkar")}\n\n`;

            output += '🌿🌸🌿🌸🌟🌿🌸🌿🌸\n\n';
            output += `🤍 *والحمدُ للهِ الذي بنعمتِه تتمُّ الصالحات* 🤍`;

            document.getElementById('copy-field').value = output;
            window.reportOutput = output;
            document.getElementById('output').classList.remove('hidden');
        }

        let output = "";

        function getStatus(name) {
            let value = document.querySelector(`input[name="${name}"]:checked`)?.value || "غير محدد";
            return value === "تم" ? "✅" : value === "لم يتم" ? "❌" : value;
        }
        function copyToClipboard() {
            const copyField = document.getElementById('copy-field');
            copyField.select();
            document.execCommand('copy');
            alert('تم نسخ التقرير! رزقكم الله الختم القريب! 💚');

        let timers = {};
        let timerIntervals = {};
        let activeTimer = null; // المؤقت الحالي

        function startTimer(surah) {

            // ⛔ أوقفي أي مؤقت شغال
            if (activeTimer && activeTimer !== surah) {
                clearInterval(timerIntervals[activeTimer]);
                timerIntervals[activeTimer] = null;
            }

            // لو المؤقت هذا شغال أصلاً لا تعيدي تشغيله
            if (timerIntervals[surah]) return;

            if (!timers[surah]) timers[surah] = 0;

            activeTimer = surah;

            timerIntervals[surah] = setInterval(() => {
                timers[surah]++;

                const minutes = Math.floor(timers[surah] / 60);
                const seconds = timers[surah] % 60;

                const input = document.getElementById(`duration-${surah}`);
                if (input) {
                    input.value =
                        `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                }
            }, 1000);
        }

        function stopTimer(surah) {
            clearInterval(timerIntervals[surah]);
            timerIntervals[surah] = null;

            if (activeTimer === surah) {
                activeTimer = null;
            }
        }
